name: Release

on:
  push:
    tags:
      - 'v*-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.5.4-242)'
        required: true
        default: 'v1.5.4-242'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION=$(echo "${TAG}" | sed 's/^v//' | sed 's/-[^-]*$//')
          CODE="${TAG##*-}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "code=${CODE}" >> "$GITHUB_OUTPUT"
          echo "title=Zindan ${VERSION} (${CODE})" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ steps.meta.outputs.tag }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Pin version code from tag
        run: |
          CODE="${{ steps.meta.outputs.code }}"
          echo "Building versionCode ${CODE}"
          sed -i "s/^VERSION_CODE=.*/VERSION_CODE=$((CODE - 1))/" version.properties
          grep VERSION version.properties

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(ls app/build/outputs/apk/debug/Zindan-*.apk | head -1)
          echo "path=${APK}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${APK}")" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        run: |
          chmod +x tools/extract_release_notes.sh
          if tools/extract_release_notes.sh "${{ steps.meta.outputs.tag }}" "${{ github.repository }}" \
            > release-notes.md; then
            echo "Release notes written ($(wc -l < release-notes.md) lines)"
          else
            cat > release-notes.md <<EOF
          ## Zindan ${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.code }})

          Debug APK built from tag \`${{ steps.meta.outputs.tag }}\`.

          Add a \`(${{ steps.meta.outputs.code }})\` section to [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) before tagging next time.

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).
          EOF
          fi
          head -20 release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          body_path: release-notes.md
          files: ${{ steps.apk.outputs.path }}
          make_latest: true
